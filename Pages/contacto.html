<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Alma Esencial - Contacto</title>
    <link rel="shortcut icon" href="../assets/Images/logoAE.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body>
    <header>
        <a href="../index.html">
            <img id="logo_principal" src="../assets/Images/logoAE.jpeg" alt="Logo de Alma Esencial">
        </a>
        <h1>Tienda Alma Esencial</h1>
        <nav class="barra_navegacion">
            <ul>
                <li class="link_navegacion">
                    <a href="./productos.html">Productos</a>
                </li>
                <li class="link_navegacion">
                    <a href="./Acerca de.html">Acerca de</a>
                </li>
                <li class="link_navegacion">
                    <a href="./galeria.html">Galería</a>
                </li>
                <li class="link_navegacion">
                    <a href="./contacto.html">Contacto</a>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Contacto</h2>

        <section class="form_map">
            <form class="formulario">
                <h3 class="titulo_formulario">Formulario de Contacto</h3>

                <label>Nombre:</label>
                <input type="text" name="nombre">

                <label>Email:</label>
                <input type="email" name="email">

                <label>Mensaje:</label>
                <textarea class="mensaje" name="mensaje"></textarea>

                <button type="submit">Enviar</button>

            </form>

            <div class="mapa">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d3283.5764543140745!2d-58.59271439239629!3d-34.61487020014101!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses-419!2sar!4v1770773646648!5m2!1ses-419!2sar"
                    width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

        </section>

        <a class="link_carrito">
            <img class="carrito" src="../assets/Images/carrito.png" alt="Carrito de Compras">
        </a>
    </main>
    <footer>
        <h2>Derechos Reservados</h2>
        <h2>Página creada por Dippercio</h2>
        <nav>
            <ul class="elementos_footer">
                <li class="logos_footer">
                    <a href="https://www.facebook.com/share/16s6UuwVtF/" target="_blank">
                        <img src="../assets/logos/logos/facebook.png" alt="Logo de Facebook" class="imagen_contacto">
                    </a>
                </li>
                <li class="logos_footer">
                    <a href="https://www.instagram.com/almaesencial_tienda?igsh=MW5xNjIwMjI4NmJreQ==" target="_blank">
                        <img src="../assets/logos/logos/instagram.png" alt="Logo de Instagram" class="imagen_contacto">
                    </a>
                </li>
                <li class="logos_footer">
                    <a href="https://www.web.whatsapp.com/" target="_blank">
                        <img src="../assets/logos/logos/whatsapp.png" alt="Logo de WhatsApp" class="imagen_contacto">
                    </a>
                </li>
            </ul>
        </nav>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
